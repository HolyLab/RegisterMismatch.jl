name: TagBot
on:
  issue_comment:
    types:
      - created
  repository_dispatch:
  workflow_dispatch:
    inputs:
      lookback:
        default: 3
permissions:
  actions: read
  checks: read
  contents: write
  deployments: read
  issues: read
  discussions: read
  packages: read
  pages: read
  pull-requests: read
  repository-projects: read
  security-events: read
  statuses: read
jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot' || (github.event_name == 'repository_dispatch' && github.event.client_payload.repository == 'HolyLab/HolyLabRegistry')
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@v1
        with:
          token: ${{ secrets.TAGBOT_TOKEN }}
          registry: HolyLab/HolyLabRegistry